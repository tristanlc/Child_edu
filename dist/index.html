        // Render tasks
        function renderTasks() {
            const container = document.getElementById('taskCategories');
            container.innerHTML = '';

            const today = getBeijingDateString();
            const todayRecords = records.filter(r =>
                getDateStringFromBeijing(new Date(r.created_at)) === today
            );
            const completedTaskIds = todayRecords.map(r => {
                const parsed = parseRecordDescription(r.description);
                return parsed.taskId;
            });

            for (const [catKey, cat] of Object.entries(categories)) {
                let catTasks = tasks.filter(t => t.category === catKey);
                
                // For growth category, always add check-in task at the beginning if checked in today
                if (catKey === 'growth' && completedTaskIds.includes('daily_checkin')) {
                    catTasks = [{ id: 'daily_checkin', name: '每日签到', category: 'growth', points: CHECK_IN_POINTS }, ...catTasks];
                }
                
                if (catTasks.length === 0) continue;

                const catDiv = document.createElement('div');
                catDiv.className = `task-category cat-${catKey}`;

                catDiv.innerHTML = `
                    <div class="category-header">
                        <div class="category-icon" style="background: ${cat.color}20;">
                            <span style="font-size: 18px;">${cat.icon}</span>
                        </div>
                        <span class="category-title">${cat.name}</span>
                    </div>
                    <div class="task-list" id="taskList-${catKey}"></div>
                `;

                container.appendChild(catDiv);

                const taskList = catDiv.querySelector(`#taskList-${catKey}`);

                catTasks.forEach(task => {
                    const isCompleted = completedTaskIds.includes(task.id);
                    const taskEl = document.createElement('div');
                    taskEl.className = `task-item ${isCompleted ? 'completed' : ''}`;
                    taskEl.innerHTML = `
                        <div class="task-checkbox">
                            ${isCompleted ? '✓' : ''}
                        </div>
                        <div class="task-info">
                            <div class="task-name">${task.name}</div>
                            <div class="task-points">+${task.points}积分</div>
                        </div>
                        ${isCompleted ? '<span class="task-date">今日已完成</span>' : ''}
                    `;

                    if (!isCompleted) {
                        taskEl.addEventListener('click', () => completeTask(task));
                    }

                    taskList.appendChild(taskEl);
                });
            }
        }

        // Complete task
        async function completeTask(task) {
            // Check if already completed or pending today (confirmed or pending)
            const today = getBeijingDateString();
            const todayCompleted = records.some(r => {
                if (getDateStringFromBeijing(new Date(r.created_at)) !== today) return false;
                if (r.status === 'rejected' || r.status === 'expired') return false; // rejected/expired tasks can be re-done
                try {
                    const parsed = JSON.parse(r.description);
                    return parsed.taskId === task.id;
                } catch {
                    return false;
                }
            });

            if (todayCompleted) {
                showToast('今日已提交此任务，等待确认中', 'error');
                return;
            }

            // Calculate today's points (only confirmed)
            const todayPoints = records
                .filter(r => getDateStringFromBeijing(new Date(r.created_at)) === today && r.status === 'confirmed')
                .reduce((sum, r) => sum + r.points, 0);

            // Calculate this week's points (Monday to Sunday, only confirmed)
            const weekStart = getBeijingWeekStart();
            
            const weekPoints = records
                .filter(r => new Date(r.created_at) >= weekStart && r.status === 'confirmed')
                .reduce((sum, r) => sum + r.points, 0);

            // Check daily limit
            if (todayPoints + task.points > DAILY_POINT_LIMIT) {
                showToast(`今日积分已达上限(${DAILY_POINT_LIMIT}分)，明天再来吧！`, 'error');
                return;
            }

            // Check weekly limit
            if (weekPoints + task.points > WEEKLY_POINT_LIMIT) {
                showToast(`本周积分已达上限(${WEEKLY_POINT_LIMIT}分)，下周再努力！`, 'error');
                return;
            }

            setSyncStatus('syncing');

            const newRecord = {
                user_id: USER_ID,
                history_type: 'add',
                points: task.points,
                description: JSON.stringify({ taskId: task.id, taskName: task.name, taskCategory: task.category }),
                status: 'pending'
            };

            try {
                const { data, error } = await supabase
                    .from('point_history')
                    .insert(newRecord)
                    .select()
                    .single();

                if (!error && data) {
                    records.unshift(data);
                    showToast(`已提交 "${task.name}"，等待家长确认...`, 'success');
                    updateUI();
                } else {
                    // Offline fallback (still pending)
                    newRecord.id = Date.now().toString();
                    newRecord.created_at = getBeijingTime().toISOString();
                    records.unshift(newRecord);
                    showToast(`已提交 "${task.name}"，等待确认... (本地)`, 'success');
                    updateUI();
                }
            } catch (error) {
                // Offline fallback (still pending)
                newRecord.id = Date.now().toString();
                newRecord.created_at = getBeijingTime().toISOString();
                records.unshift(newRecord);
                showToast(`已提交 "${task.name}"，等待确认... (本地)`, 'success');
                updateUI();
            }

            setSyncStatus('synced');
        }

        // Render exchange list
        function renderExchangeList() {
            const container = document.getElementById('exchangeList');
            container.innerHTML = rewards.map(reward => `
                <div class="wish-item">
                    <div class="wish-icon">${reward.wish_type_name}</div>
                    <div class="wish-name">${reward.content}</div>
                    <div class="wish-points">${reward.target_points}积分</div>
                    <div class="wish-progress">
                        <div class="wish-progress-bar" style="width: ${Math.min(100, (userPoints / reward.target_points) * 100)}%"></div>
                    </div>
                    <button class="btn btn-sm ${userPoints >= reward.target_points ? 'btn-success' : 'btn-secondary'} mt-2"
                            ${userPoints < reward.target_points ? 'disabled' : ''}
                            onclick="exchangeReward('${reward.id}')">
                        ${userPoints >= reward.target_points ? '兑换' : '积分不足'}
                    </button>
                </div>
            `).join('');
        }

        // Exchange reward
        async function exchangeReward(rewardId) {
            const reward = rewards.find(r => r.id === rewardId);
            if (!reward || userPoints < reward.target_points) {
                showToast('积分不足', 'error');
                return;
            }

            if (confirm(`确定要用${reward.target_points}积分兑换"${reward.content}"吗？`)) {
                userPoints -= reward.target_points;
                showToast(`恭喜！已兑换 "${reward.content}"`, 'success');
                updateUI();
            }
        }

        // Render wishes
        function renderWishes() {
            const container = document.getElementById('wishList');

            if (wishes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💫</div>
                        <p class="empty-text">还没有愿望，添加一个吧！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = wishes.map(wish => `
                <div class="card">
                    <div class="flex items-center gap-2">
                        <span style="font-size: 24px;">${wish.wish_type_name}</span>
                        <div class="flex-1">
                            <div class="card-title">${wish.content}</div>
                            <div class="task-points">需要 ${wish.target_points} 积分</div>
                        </div>
                        <button class="btn btn-sm btn-danger" onclick="deleteWish('${wish.id}')">删除</button>
                    </div>
                    <div class="wish-progress mt-2">
                        <div class="wish-progress-bar" style="width: ${Math.min(100, (userPoints / wish.target_points) * 100)}%"></div>
                    </div>
                    <div class="text-right mt-2" style="font-size: 12px; color: var(--gray);">
                        ${userPoints} / ${wish.target_points} 积分
                    </div>
                </div>
            `).join('');
        }

        // Render stats
        function renderStats() {
            const now = getBeijingTime();
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            const weekRecords = records.filter(r => new Date(r.created_at) >= weekAgo);

            // Calculate streak
            let streak = 0;
            let checkDateStr = getBeijingDateString();
            while (true) {
                const dayRecords = records.filter(r =>
                    getDateStringFromBeijing(new Date(r.created_at)) === checkDateStr
                );
                if (dayRecords.length > 0) {
                    streak++;
                    const parts = checkDateStr.split('-');
                    const year = parseInt(parts[0]);
                    const month = parseInt(parts[1]) - 1;
                    const day = parseInt(parts[2]) - 1;
                    const prevDate = new Date(Date.UTC(year, month, day));
                    checkDateStr = getDateStringFromBeijing(prevDate);
                } else {
                    break;
                }
            }

            document.getElementById('totalTasks').textContent = records.length;
            document.getElementById('totalPoints').textContent = userPoints;
            document.getElementById('weekTasks').textContent = weekRecords.length;
            document.getElementById('streakDays').textContent = streak;

            // Week chart
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const chartData = [];

            for (let i = 6; i >= 0; i--) {
                const date = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
                const dateStr = getDateStringFromBeijing(date);
                const dayRecords = records.filter(r =>
                    getDateStringFromBeijing(new Date(r.created_at)) === dateStr
                );
                chartData.push({
                    day: weekDays[date.getUTCDay()],
                    count: dayRecords.length
                });
            }

            const maxCount = Math.max(...chartData.map(d => d.count), 1);
            document.getElementById('weekChart').innerHTML = chartData.map(d => `
                <div class="chart-bar-item">
                    <div class="chart-bar-fill" style="height: ${(d.count / maxCount) * 100}%; background: var(--primary);"></div>
                    <span class="chart-bar-label">${d.day}</span>
                </div>
            `).join('');
        }

        // Update parent UI
        function updateParentUI() {
            renderParentWeekCalendar();
            
            // Today's points (only confirmed)
            const today = getBeijingDateString();
            const todayPoints = records
                .filter(r => getDateStringFromBeijing(new Date(r.created_at)) === today && r.status === 'confirmed')
                .reduce((sum, r) => sum + r.points, 0);
            document.getElementById('parentTodayPoints').textContent = todayPoints;

            // Today's confirmed tasks
            const todayRecords = records.filter(r =>
                getDateStringFromBeijing(new Date(r.created_at)) === today && r.status === 'confirmed'
            );

            document.getElementById('todayTasks').innerHTML = todayRecords.length > 0
                ? todayRecords.map(r => {
                    const parsed = parseRecordDescription(r.description);
                    return `
                    <div class="card">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span>${categories[parsed.taskCategory]?.icon || '📋'}</span>
                                <span>${parsed.taskName}</span>
                            </div>
                            <span style="color: var(--success);">+${r.points}</span>
                        </div>
                    </div>
                `}).join('')
                : '<div class="empty-state"><div class="empty-icon">📋</div><p class="empty-text">今天还没有确认的任务</p></div>';

            // Render pending tasks
            renderPendingTasks();

            // Records list
            renderRecords('all');

            // Manage tasks
            document.getElementById('manageTaskList').innerHTML = tasks.map(task => `
                <div class="card">
                    <div class="flex items-center justify-between">
                        <div>
                            <span style="margin-right: 8px;">${categories[task.category]?.icon}</span>
                            <strong>${task.name}</strong>
                        </div>
                        <div class="flex items-center gap-2">
                            <span style="color: var(--secondary);">${task.points}积分</span>
                            <button class="btn btn-sm btn-secondary" onclick="editTask('${task.id}')">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteTask('${task.id}')">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Manage rewards
            document.getElementById('manageRewardList').innerHTML = rewards.map(reward => `
                <div class="card">
                    <div class="flex items-center justify-between">
                        <div>
                            <span style="margin-right: 8px; font-size: 20px;">${reward.wish_type_name}</span>
                            <strong>${reward.content}</strong>
                        </div>
                        <div class="flex items-center gap-2">
                            <span style="color: var(--secondary);">${reward.target_points}积分</span>
                            <button class="btn btn-sm btn-danger" onclick="deleteReward('${reward.id}')">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Render records (only confirmed records)
        function renderRecords(filter) {
            const confirmedRecords = records.filter(r => r.status === 'confirmed');
            const filtered = filter === 'all'
                ? confirmedRecords
                : confirmedRecords.filter(r => {
                    const parsed = parseRecordDescription(r.description);
                    return parsed.taskCategory === filter;
                });

            document.getElementById('recordsList').innerHTML = filtered.length > 0
                ? filtered.map(r => {
                    const parsed = parseRecordDescription(r.description);
                    return `
                    <div class="record-item">
                        <div class="record-info">
                            <span class="record-task">${categories[parsed.taskCategory]?.icon} ${parsed.taskName}</span>
                            <span class="record-meta">${formatDateLocal(r.created_at)}</span>
                        </div>
                        <span class="record-points">+${r.points}</span>
                    </div>
                `}).join('')
                : '<div class="empty-state"><div class="empty-icon">📝</div><p class="empty-text">暂无已确认记录</p></div>';
        }

        // Filter records
        function filterRecords(filter) {
            renderRecords(filter);
        }

        // Render pending tasks for parent confirmation
        function renderPendingTasks() {
            const pendingRecords = records.filter(r => r.status === 'pending');
            const pendingList = document.getElementById('pendingList');
            const noPendingMsg = document.getElementById('noPendingMsg');
            const pendingCount = document.getElementById('pendingCount');

            pendingCount.textContent = pendingRecords.length;

            if (pendingRecords.length === 0) {
                pendingList.innerHTML = '';
                noPendingMsg.style.display = 'block';
                return;
            }

            noPendingMsg.style.display = 'none';
            pendingList.innerHTML = pendingRecords.map(r => {
                const parsed = parseRecordDescription(r.description);
                const recordDateStr = getDateStringFromBeijing(new Date(r.created_at));
                const isToday = recordDateStr === getBeijingDateString();
                return `
                <div class="card" style="margin-bottom: 12px;">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span style="font-size: 24px;">${categories[parsed.taskCategory]?.icon || '📋'}</span>
                            <div>
                                <div style="font-weight: 600;">${parsed.taskName}</div>
                                <div style="font-size: 12px; color: var(--gray);">
                                    ${isToday ? '今日' : formatDateLocal(r.created_at)} · ${r.points}积分
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button class="btn btn-sm btn-success" onclick="confirmRecord('${r.id}')">✓ 确认</button>
                            <button class="btn btn-sm btn-danger" onclick="rejectRecord('${r.id}')">✗ 拒绝</button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // Confirm a pending record
        async function confirmRecord(recordId) {
            try {
                const record = records.find(r => r.id === recordId);
                if (!record) return;

                const { error } = await supabase
                    .from('point_history')
                    .update({ status: 'confirmed' })
                    .eq('id', recordId);

                if (!error) {
                    const index = records.findIndex(r => r.id === recordId);
                    if (index !== -1) {
                        records[index].status = 'confirmed';
                    }
                    userPoints += record.points;
                    showToast(`已确认，+${record.points}积分发放成功！`, 'success');
                    updateUI();
                } else {
                    showToast('确认失败: ' + error.message, 'error');
                }
            } catch (error) {
                showToast('确认失败', 'error');
            }
        }

        // Reject a pending record (delete it so child can resubmit)
        async function rejectRecord(recordId) {
            if (!confirm('确定要拒绝此任务吗？孩子将可以重新提交。')) return;

            try {
                const { error } = await supabase
                    .from('point_history')
                    .delete()
                    .eq('id', recordId);

                if (!error) {
                    records = records.filter(r => r.id !== recordId);
                    showToast('已拒绝，孩子可重新提交', 'success');
                    updateUI();
                } else {
                    showToast('拒绝失败: ' + error.message, 'error');
                }
            } catch (error) {
                showToast('拒绝失败', 'error');
            }
        }

        // Render records

        // Modal functions
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function openAddTaskModal() {
            document.getElementById('taskModalTitle').textContent = '添加任务';
            document.getElementById('taskName').value = '';
            document.getElementById('taskCategory').value = 'study';
            document.getElementById('taskPoints').value = '10';
            document.getElementById('editTaskId').value = '';
            openModal('taskModal');
        }

        function editTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            document.getElementById('taskModalTitle').textContent = '编辑任务';
            document.getElementById('taskName').value = task.name;
            document.getElementById('taskCategory').value = task.category;
            document.getElementById('taskPoints').value = task.points;
            document.getElementById('editTaskId').value = taskId;
            openModal('taskModal');
        }

        async function saveTask() {
            const name = document.getElementById('taskName').value.trim();
            const category = document.getElementById('taskCategory').value;
            const points = parseInt(document.getElementById('taskPoints').value) || 10;
            const editId = document.getElementById('editTaskId').value;

            if (!name) {
                showToast('请输入任务名称', 'error');
                return;
            }

            if (editId) {
                // Update existing task in database
                const updateData = {
                    task_name: name,
                    task_category: category,
                    task_points: points
                };
                try {
                    const { error } = await supabase
                        .from('daily_tasks')
                        .update(updateData)
                        .eq('task_id', editId);
                    
                    if (!error) {
                        const index = tasks.findIndex(t => t.id === editId);
                        if (index !== -1) {
                            tasks[index] = { ...tasks[index], name, category, points };
                        }
                        showToast('任务已更新', 'success');
                    } else {
                        showToast('更新失败: ' + error.message, 'error');
                    }
                } catch (error) {
                    showToast('更新失败', 'error');
                }
            } else {
                // Add new task to database
                const newTask = {
                    user_id: USER_ID,
                    task_date: getBeijingDateString(),
                    task_id: Date.now().toString(),
                    task_name: name,
                    task_category: category,
                    task_points: points,
                    completed: false
                };
                try {
                    const { data, error } = await supabase.from('daily_tasks').insert(newTask).select().single();
                    if (data && !error) {
                        tasks.unshift({
                            id: data.task_id,
                            name: data.task_name,
                            category: data.task_category,
                            points: data.task_points
                        });
                    } else {
                        newTask.id = Date.now().toString();
                        tasks.unshift({ id: newTask.task_id, name, category, points });
                    }
                    showToast('任务已添加', 'success');
                } catch (error) {
                    tasks.unshift({ id: newTask.task_id, name, category, points });
                    showToast('任务已添加 (本地)', 'success');
                }
            }

            closeModal('taskModal');
            updateUI();
        }

        async function deleteTask(taskId) {
            if (!confirm('确定要删除这个任务吗？')) return;

            tasks = tasks.filter(t => t.id !== taskId);
            await supabase.from('daily_tasks').delete().eq('task_id', taskId);
            showToast('任务已删除', 'success');
            updateUI();
        }

        function openAddWishModal() {
            document.getElementById('wishName').value = '';
            document.getElementById('wishPoints').value = '50';
            document.getElementById('wishIcon').value = '🎁';
            openModal('wishModal');
        }

        async function saveWish() {
            const content = document.getElementById('wishName').value.trim();
            const target_points = parseInt(document.getElementById('wishPoints').value) || 50;
            const wish_type_name = document.getElementById('wishIcon').value;
            const wish_type = 'item';

            if (!content) {
                showToast('请输入愿望名称', 'error');
                return;
            }

            const newWish = { wish_type, wish_type_name, content, target_points };
            try {
                const { data } = await supabase.from('wishes').insert(newWish).select().single();
                if (data) {
                    wishes.unshift(data);
                } else {
                    newWish.id = Date.now().toString();
                    wishes.unshift(newWish);
                }
            } catch (error) {
                newWish.id = Date.now().toString();
                wishes.unshift(newWish);
            }

            closeModal('wishModal');
            showToast('愿望已添加', 'success');
            updateUI();
        }

        async function deleteWish(wishId) {
            if (!confirm('确定要删除这个愿望吗？')) return;

            wishes = wishes.filter(w => w.id !== wishId);
            await supabase.from('wishes').delete().eq('id', wishId);
            showToast('愿望已删除', 'success');
            updateUI();
        }

        function openAddRewardModal() {
            document.getElementById('rewardName').value = '';
            document.getElementById('rewardPoints').value = '50';
            document.getElementById('rewardIcon').value = '🎁';
            openModal('rewardModal');
        }

        async function saveReward() {
            const content = document.getElementById('rewardName').value.trim();
            const target_points = parseInt(document.getElementById('rewardPoints').value) || 50;
            const wish_type_name = document.getElementById('rewardIcon').value;
            const wish_type = 'item';

            if (!content) {
                showToast('请输入奖励名称', 'error');
                return;
            }

            const newReward = { wish_type, wish_type_name, content, target_points };
            try {
                const { data } = await supabase.from('wishes').insert(newReward).select().single();
                if (data) {
                    rewards.unshift(data);
                } else {
                    newReward.id = Date.now().toString();
                    rewards.unshift(newReward);
                }
            } catch (error) {
                newReward.id = Date.now().toString();
                rewards.unshift(newReward);
            }

            closeModal('rewardModal');
            showToast('奖励已添加', 'success');
            updateUI();
        }

        async function deleteReward(rewardId) {
            if (!confirm('确定要删除这个奖励吗？')) return;

            rewards = rewards.filter(r => r.id !== rewardId);
            await supabase.from('wishes').delete().eq('id', rewardId);
            showToast('奖励已删除', 'success');
            updateUI();
        }

        // Sync status
        function setSyncStatus(status) {
            isSyncing = status === 'syncing';

            const dot = document.getElementById('syncDot') || document.getElementById('parentSyncDot');
            const text = document.getElementById('syncText') || document.getElementById('parentSyncText');

            dot.className = 'sync-dot';

            switch (status) {
                case 'syncing':
                    dot.classList.add('syncing');
                    if (text) text.textContent = '同步中...';
                    break;
                case 'synced':
                    if (text) text.textContent = '已同步';
                    break;
                case 'error':
                    dot.classList.add('error');
                    if (text) text.textContent = '离线';
                    break;
            }
        }

        // Toast notification
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
